name: Deploy Alarm Service

on:
  push:
    branches:
      - feat/cicd
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: alarm-service
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. gradlew 실행 권한
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. application-prod.yml & firebase 생성
      - name: Restore application-prod.yml & firebase
        run: |
          mkdir -p src/main/resources/firebase
          echo "${{ secrets.FIREBASE_BASE64 }}" | base64 -d > src/main/resources/firebase/docconneting-firebase-adminsdk-fbsvc-017c34b883.json
          echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 -d > src/main/resources/application-prod.yml

      # 5. bootJar 빌드
      - name: Build bootJar
        run: ./gradlew clean bootJar -x test

      # 6. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 7. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 8. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # 9. EC2 SSH 연결 및 배포
      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to Alarm EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ALARM_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/alarm-server && cd ~/alarm-server

            echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 -d > application-prod.yml
            mkdir -p firebase
            echo "${{ secrets.FIREBASE_BASE64 }}" | base64 -d > firebase/docconneting-firebase-adminsdk-fbsvc-017c34b883.json

            cat <<EOF > docker-compose.yml
            services:
              alarm:
                image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
                container_name: alarm
                restart: always
                ports:
                  - "9003:9003"
                volumes:
                  - ./application-prod.yml:/app/config/application-prod.yml
                  - ./firebase:/app/firebase
                environment:
                  - SPRING_PROFILES_ACTIVE=prod
            EOF

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            docker compose down --remove-orphans
            docker compose pull
            docker system prune -af
            docker compose up -d
