name: Deploy Alarm Service

on:
  pull_request:
    types: [ closed ]
    branches:
      - dev

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Prepare SSH and resource files
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCCONNETING_SSH_KEY }}" | base64 --decode > ~/.ssh/docconneting.pem
          chmod 600 ~/.ssh/docconneting.pem

          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            StrictHostKeyChecking no

          Host alarm
            HostName ${{ secrets.ALARM_PRIVATE_IP }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

          echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 -d > application-prod.yml
          mkdir -p firebase
          echo "${{ secrets.FIREBASE_BASE64 }}" | base64 -d > firebase/docconneting-firebase-adminsdk.json

      - name: Generate docker-compose.yml for Alarm
        run: |
          cat <<EOF > docker-compose.yml
          services:
            alarm:
              image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
              container_name: alarm
              restart: always
              ports:
                - "9003:9003"
              volumes:
                - ./application-prod.yml:/app/config/application-prod.yml
                - ./firebase:/app/firebase
              environment:
                - SPRING_PROFILES_ACTIVE=prod
          EOF

      - name: Deploy to Alarm EC2 via Bastion
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

          scp -o StrictHostKeyChecking=no -r docker-compose.yml application-prod.yml firebase alarm:/home/ubuntu/alarm-server/

          ssh alarm <<EOF
            cd ~/alarm-server

            # Docker 설치
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            # Docker Compose 설치
            if ! docker compose version &> /dev/null; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.2/docker-compose-linux-x86_64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # ECR 로그인 (변수 사용)
            aws ecr get-login-password --region ap-northeast-2 | \
              sudo docker login --username AWS --password-stdin $ECR_REGISTRY

            sudo docker compose down --remove-orphans
            sudo docker compose pull
            sudo docker system prune -af
            sudo docker compose up -d
          EOF
