name: Deploy Alarm Service

on:
  pull_request:
    types: [ closed ]      # PR이 닫힐 때 (merge 포함)
    branches:
      - dev                # dev 브랜치에 대한 PR이 병합되었을 때만 실행

env:
  ECR_REPOSITORY: alarm-service  # ECR에 저장될 리포지토리 이름
  IMAGE_TAG: latest              # Docker 이미지 태그

jobs:
  deploy:
    if: github.event.pull_request.merged == true  # PR이 실제로 병합된 경우에만 실행
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 현재 저장소의 코드를 가져옴

      - name: Set up JDK
        uses: actions/setup-java@v3  # Java 환경 설정
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test  # 테스트 제외하고 JAR 빌드

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2  # AWS 인증 설정
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2  # Docker 이미지 푸시를 위한 ECR 로그인

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Prepare SSH and resource files
        run: |
          # SSH 접속 설정
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCCONNETING_SSH_KEY }}" | base64 --decode > ~/.ssh/docconneting.pem
          chmod 600 ~/.ssh/docconneting.pem

          # SSH 구성: bastion → alarm 서버
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            StrictHostKeyChecking no

          Host alarm
            HostName ${{ secrets.ALARM_PRIVATE_IP }}
            User ubuntu
            IdentityFile ~/.ssh/docconneting.pem
            ProxyJump bastion
            StrictHostKeyChecking no
          EOF

          # 환경 설정 파일 복원
          echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 -d > application-prod.yml

          # Firebase 인증 JSON 복원
          mkdir -p firebase
          echo "${{ secrets.FIREBASE_BASE64 }}" | base64 -d > firebase/docconneting-firebase-adminsdk.json

      - name: Generate docker-compose.yml for Alarm
        run: |
          # 도커 컴포즈 설정 파일 생성
          cat <<EOF > docker-compose.yml
          services:
            alarm:
              image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
              container_name: alarm
              restart: always
              ports:
                - "9003:9003"
              volumes:
                - ./application-prod.yml:/app/config/application-prod.yml
                - ./firebase:/app/firebase
              environment:
                - SPRING_PROFILES_ACTIVE=prod
                - SPRING_RABBITMQ_ADDRESSES=${{ secrets.RABBITMQ_HOST }}
          EOF

      - name: Deploy to Alarm EC2 via Bastion
        run: |
          # ECR 주소 변수 설정
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

          # EC2로 파일 전송
          scp -o StrictHostKeyChecking=no -r docker-compose.yml application-prod.yml firebase alarm:/home/ubuntu/alarm-server/

          # EC2에 SSH로 접속하여 배포 작업 실행
          ssh alarm <<EOF
            cd ~/alarm-server

            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 | \
              sudo docker login --username AWS --password-stdin $ECR_REGISTRY

            # 기존 컨테이너 종료 및 최신 이미지로 재시작
            sudo docker compose down --remove-orphans
            sudo docker compose pull
            sudo docker system prune -af
            sudo docker compose up -d
          EOF