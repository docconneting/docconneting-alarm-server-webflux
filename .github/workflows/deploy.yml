name: Deploy Alarm Service

on:
  push:
    branches:
      - feat/cicd
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: alarm-service
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore prod resources
        run: |
          mkdir -p src/main/resources/firebase
          echo "${{ secrets.FIREBASE_BASE64 }}" | base64 --decode > src/main/resources/firebase/docconneting-firebase-adminsdk-fbsvc-017c34b883.json
          echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 --decode > src/main/resources/application-prod.yml

      - name: Build bootJar
        run: ./gradlew clean bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.DOCCONNETING_SSH_KEY }}

      - name: Deploy to Alarm EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ALARM_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.DOCCONNETING_SSH_KEY }}
          script: |
            mkdir -p ~/alarm-server && cd ~/alarm-server

            echo "${{ secrets.APPLICATION_PROD_YML_CONTENT }}" | base64 -d > application-prod.yml
            mkdir -p firebase
            echo "${{ secrets.FIREBASE_BASE64 }}" | base64 -d > firebase/docconneting-firebase-adminsdk-fbsvc-017c34b883.json

            cat <<EOF > docker-compose.yml
            services:
              alarm:
                image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
                container_name: alarm
                restart: always
                ports:
                  - "9003:9003"
                volumes:
                  - ./application-prod.yml:/app/config/application-prod.yml
                  - ./firebase:/app/firebase
                environment:
                  - SPRING_PROFILES_ACTIVE=prod
            EOF

            # Docker & Compose 설치 (필요 시)
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            if ! docker compose version &> /dev/null; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.2/docker-compose-linux-x86_64 \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # 배포
            docker compose down --remove-orphans
            docker compose pull
            docker system prune -af
            docker compose up -d
