name: Test Every PR

on:
  push:
    branches:
      - feat/cicd  # 필요 시 main 등으로 수정 가능
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: "0000"
          MYSQL_DATABASE: docconneting_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # 2. JDK 17 설치
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. MySQL 준비 시간 확보
      - name: Wait for MySQL to be ready
        run: sleep 20

      # 5. MySQL 접속 및 테이블 확인 (디버깅용)
      - name: Check MySQL connection
        run: |
          sudo apt-get update && sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -P 3306 -u root -p0000 -e "SHOW DATABASES;"
          mysql -h 127.0.0.1 -P 3306 -u root -p0000 -e "SHOW TABLES FROM docconneting_test;"

      # 6. 테스트 실행 (test 프로파일 활성화)
      - name: Run Tests with `test` profile
        run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
